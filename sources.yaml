# tech-blog-watch 監看來源
#
# 每個來源欄位：
#   name          顯示名稱
#   mode          rss | scrape
#   url           RSS feed 網址（rss）或列表頁網址（scrape）
#   base          （scrape 專用）相對連結要補上的網域
#   link_pattern  （scrape 專用）文章連結的 regex，用來從列表頁挑出文章 URL
#
# 加新來源：RSS 有就用 rss（穩），沒有就用 scrape + link_pattern。

settings:
  max_age_days: 7      # 只處理近 N 天發佈的文章（抓不到日期的仍會處理，靠 state 去重）
  max_per_source: 6    # 每個來源單次最多處理幾篇（防洪水）
  max_per_run: 20      # 單次整體上限（保險絲）
  model: gemini-3.5-flash   # 免費 tier flash；想更省可換 gemini-2.5-flash / gemini-2.5-flash-lite
  article_char_limit: 12000   # 丟給 Gemini 的內文字元上限（控 token）
  pulse_enabled: true   # 每日「AI 產業脈動」段落（Gemini Grounding with Google Search）
  finance_pulse_enabled: true   # 每日「金融×AI 脈動」段落（同樣走 grounding；每個啟用的段每天各花 1 次 grounded query）
  pulse_model: gemini-2.5-flash   # 脈動用的模型；3.5-flash 的 grounded query 在免費 key 上會 429，2.5 系列另有每日免費額度
  github_weekly_enabled: true   # 每週「GitHub 專案」段（HN 高分 + GitHub Trending；非 grounded，用一般摘要模型）
  github_weekly_weekday: 2      # 台北時間星期幾出（0=週一；2=週三）
  github_weekly_top_n: 5        # 每次最多介紹幾個專案（上限不是目標）
  github_hn_min_points: 100     # HN 候選的最低分數門檻
  github_refeature_days: 14     # 介紹過的 repo 至少隔幾天、且有新 release 才會再出現

# company：用於 email/Slack 標題的 [公司 News] 前綴；沒填就用 name。
sources:
  - name: Databricks
    company: Databricks
    mode: scrape
    url: https://www.databricks.com/blog
    base: https://www.databricks.com
    link_pattern: '^/blog/[a-z0-9][a-z0-9-]{6,}$'

  - name: Anthropic
    company: Anthropic
    mode: scrape
    url: https://claude.com/blog
    base: https://claude.com
    link_pattern: '^/blog/[a-z0-9][a-z0-9-]{6,}$'

  - name: OpenAI News
    company: OpenAI
    mode: rss
    url: https://openai.com/news/rss.xml

  - name: OpenAI Developers
    company: OpenAI
    mode: scrape
    url: https://developers.openai.com/blog
    base: https://developers.openai.com
    link_pattern: '^/blog/[a-z0-9][a-z0-9-]{6,}$'

  - name: NVIDIA Developer
    company: NVIDIA
    mode: rss
    url: https://developer.nvidia.com/blog/feed

  - name: Google Research
    company: Google
    mode: rss
    url: https://research.google/blog/rss/

  - name: Google DeepMind
    company: Google
    mode: rss
    url: https://deepmind.google/blog/rss.xml

  - name: Hugging Face
    company: Hugging Face
    mode: rss
    url: https://huggingface.co/blog/feed.xml

  - name: Thinking Machines
    company: Thinking Machines
    mode: scrape
    url: https://thinkingmachines.ai/news/
    base: https://thinkingmachines.ai
    link_pattern: '^/news/[a-z0-9][a-z0-9-]{4,}/?$'
