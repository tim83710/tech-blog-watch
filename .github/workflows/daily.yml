name: daily-blog-watch

on:
  schedule:
    # 22:30 UTC = 06:30 隔天台北時間（Actions cron 只吃 UTC）
    # 註：GitHub 排程為 best-effort，尖峰可能延遲數小時，實際到信時間會晚於此。
    - cron: "30 22 * * *"
  workflow_dispatch:        # 允許在 GitHub 網頁上手動觸發（測試用）

# 讓 workflow 能把更新後的 state.json commit 回 repo
permissions:
  contents: write

concurrency:
  group: daily-blog-watch
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25       # 任一步驟卡住就 25 分鐘收工，不再佔滿 6h 上限被強制取消
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tech-blog-watch
        env:
          PYTHONUNBUFFERED: "1"   # 不緩衝 stdout：萬一卡住，log 也能看到卡在哪一步
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}   # 選填：不設就用 sources.yaml 的預設
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          SLACK_USERNAME: ${{ secrets.SLACK_USERNAME }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          # 平台開關：repo Settings → Secrets and variables → Actions → Variables
          # 設 SEND_SLACK / SEND_EMAIL 為 false 可關閉該平台；沒設＝都發
          SEND_SLACK: ${{ vars.SEND_SLACK }}
          SEND_EMAIL: ${{ vars.SEND_EMAIL }}
          # GitHub API 配額（每週 GitHub 專案段抓 README / release 用；自動提供、不用另設）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- state.json; then
            git add state.json
            git commit -m "chore: update seen state [skip ci]"
            git push
          else
            echo "state.json unchanged"
          fi
